# Generated from the shared en-GB-oxendict dictionary.
# Regenerate with typos-config-builder; do not edit by hand.

[files]
extend-exclude = [
    ".git",
    ".hypothesis",
    ".pytest_cache",
    ".terraform",
    ".tox",
    ".typos-oxendict-base.json",
    ".typos-oxendict-base.toml",
    ".uv-cache",
    ".uv-tools",
    ".venv",
    "Cargo.lock",
    "bun.lock",
    "data/typos-oxendict-base.toml",
    "dist",
    "node_modules",
    "package-lock.json",
    "pnpm-lock.yaml",
    "target",
    "typos.local.toml",
    "typos.toml",
    "uv.lock",
    "yarn.lock",
]

[default]
locale = "en-gb"
extend-ignore-re = [
    "(?s)```.*?```",
    "Azure Architecture\\s+Center \\| Microsoft Learn",
    "GitHub Flavored\\s+Markdown \\(GFM\\)",
    "LogRocket Blog — Organizing Rust tests",
    "\\bCARGO_TERM_COLOR\\b",
    "\\brust-analyzer\\b",
    "`[^`\\n]+`",
    "types: \\[opened, reopened, synchronize, labeled, ready_for_review\\]",
]

